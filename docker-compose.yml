name: quality-inspection

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: qi-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 -h localhost || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: qi-backend
    depends_on:
      mqtt:
        condition: service_started
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      CAMERA_FPS: "2.0"
      DEFECT_RATE: "0.35"
      YOLO_ENABLED: "true"
      YOLO_WEIGHTS: "/data/models/yolo11n.pt"
      QI_DATA_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: qi-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_URL: http://backend:8000
      REFRESH_MS: "1200"
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  backend_data:
