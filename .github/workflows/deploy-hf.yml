name: Deploy to Hugging Face Spaces

# Syncs this repo to your HF Space on every commit to main (and on demand).
# Setup (one time):
#   1. Create the Docker Space once at https://huggingface.co/new-space
#      (SDK = Docker, name = industrial-quality-inspection).
#   2. Create an HF access token (type: WRITE) at
#      https://huggingface.co/settings/tokens
#   3. In GitHub: Settings > Secrets and variables > Actions
#        - Add secret  HF_TOKEN     = <your HF write token>
#        - (optional) variables HF_USERNAME / HF_SPACE if different from below.
on:
  push:
    branches: [main]
  workflow_dispatch:

# HF_USERNAME must be your *Hugging Face* username (the token owner),
# which may differ from your GitHub username. Override via repo variables if so.
env:
  HF_USERNAME: ${{ vars.HF_USERNAME || 'martian7777' }}
  HF_SPACE: ${{ vars.HF_SPACE || 'industrial-quality-inspection' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.25"

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          python - <<'PY'
          import os, sys, time
          from huggingface_hub import HfApi
          from huggingface_hub.utils import HfHubHTTPError

          token = os.environ["HF_TOKEN"].strip()
          api = HfApi(token=token)
          repo_id = f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE']}"

          def looks_rate_limited(exc):
              # HF rate limits (429) can surface as a clean HfHubHTTPError, or — when
              # the throttled response body is an HTML/empty 429 page that the client
              # still tries to .json() — as a bare JSONDecodeError or ValueError.
              status = getattr(getattr(exc, "response", None), "status_code", None)
              if status == 429:
                  return True
              return "429" in str(exc) or "Expecting value" in str(exc)

          def with_retry(label, fn, attempts=5, delay=30):
              for attempt in range(1, attempts + 1):
                  try:
                      return fn()
                  except Exception as e:
                      if looks_rate_limited(e) and attempt < attempts:
                          print(f"::warning::{label}: rate limited, attempt "
                                f"{attempt}/{attempts}. Waiting {delay}s before retry...")
                          time.sleep(delay)
                          delay *= 2
                          continue
                      raise

          # Ensure the Space exists. Non-fatal: a manually-created Space (or one that
          # survives a 429 here) is still uploaded to below.
          try:
              with_retry(
                  "create_repo",
                  lambda: api.create_repo(
                      repo_id, repo_type="space", space_sdk="docker", exist_ok=True
                  ),
              )
              print(f"Space ready: {repo_id}")
          except Exception as e:
              print(f"::warning::create_repo skipped ({e}). Continuing to upload "
                    f"(create the Space manually at https://huggingface.co/new-space "
                    f"if it does not exist yet).")

          # Upload with retry/backoff so transient 429 rate limits self-heal. We catch
          # broadly here: upload_folder pre-validates the README YAML via a separate
          # API call that, when throttled, raises JSONDecodeError rather than
          # HfHubHTTPError — so a 429-only filter would let it crash the job.
          ignore = [
              ".git*", ".github/*",
              "**/__pycache__/*", "**/*.pyc",
              "backend/.pytest_cache/*", "backend/tests/*",
              "data/*",
          ]
          try:
              with_retry(
                  "upload_folder",
                  lambda: api.upload_folder(
                      repo_id=repo_id,
                      repo_type="space",
                      folder_path=".",
                      commit_message=f"Sync from GitHub {os.environ.get('GITHUB_SHA','')[:7]}",
                      ignore_patterns=ignore,
                  ),
              )
              print(f"Deployed: https://huggingface.co/spaces/{repo_id}")
          except Exception as e:
              print(f"::error::Upload failed after retries: {e}")
              sys.exit(1)
          PY
